<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Byte.IT Dashboard</title>
  <link rel="icon" type="image/x-icon" href="assets/icons/logoBlue.webp">
  <link rel="stylesheet" href="assets/css/workshop.css">
  <link rel="stylesheet" href="assets/css/byteit-registration.css">
</head>

<body>
  <div class="rectangle rectangle-left"></div>
  <div class="rectangle rectangle-right"></div>
  <div class="rectangle rectangle-top"></div>
  <div class="rectangle rectangle-nav"></div>

  <section id="bigNav" class="center bigNav">
    <div class="left">
      <div>
        <span onclick="navMenuClick()" id="span1" onmouseover="rotateNumbers(this)"
          onmouseout="stopRotateNumbers(this)">
          <div class="numbers">
            <div class="number"></div>
          </div>
          <a href="/#spanA">ABOUT</a>
        </span>
      </div>
      <div>
        <span id="span2" onmouseover="rotateNumbers(this)" onmouseout="stopRotateNumbers(this)">
          <div class="numbers">
            <div class="number"></div>
            <div class="number"></div>
          </div>
          <a href="team">TEAM</a>
        </span>
      </div>
      <div>
        <span id="span3" onmouseover="rotateNumbers(this)" onmouseout="stopRotateNumbers(this)">
          <div class="numbers">
            <div class="number"></div>
            <div class="number"></div>
            <div class="number"></div>
          </div>
          <a href="resources">RESOURCES</a>
        </span>
      </div>
      <div>
        <span id="span4" onmouseover="rotateNumbers(this)" onmouseout="stopRotateNumbers(this)">
          <div class="numbers">
            <div class="number"></div>
            <div class="number"></div>
            <div class="number"></div>
            <div class="number"></div>
          </div>
          <a href="byteit">BYTE.IT</a>
        </span>
      </div>
    </div>
    <div class="right">
      <span onmouseover="document.getElementById('spanContact').style.width='100%'"
        onmouseout="document.getElementById('spanContact').style.width='0%'">
        <a href="contact">Contact</a>
        <span id="spanContact"></span>
      </span>
      <span onmouseover="document.getElementById('spanCredits').style.width='100%'"
        onmouseout="document.getElementById('spanCredits').style.width='0%'">
        <a href="credits">Credits</a>
        <span id="spanCredits"></span>
      </span>
    </div>
  </section>

  <div class="nav">
    <span id="navByte" onclick="window.location = '/';" class="navByte">byte.</span>
    <span onmouseout="rotateBack()" onmouseover="rotateStop()" onclick="navMenuClick()" class="center menuNav">
      <img id="circle1" class="circle1" src="assets/icons/circle1.svg" alt="">
      <img id="circle2" class="circle2" src="assets/icons/circle2.svg" alt="">
      <div class="lines">
        <div id="line1" class="line1"></div>
        <div id="line2" class="line2"></div>
      </div>
    </span>
  </div>

  <main class="byteit-shell">
    <section class="dashboard-header">
      <div>
        <span class="byteit-kicker">School dashboard</span>
        <h1 class="byteit-title">Events</h1>
      </div>
      <div class="auth-card">
        <strong data-school-name>School</strong>
        <p data-school-email>school@example.com</p>
        <button class="ghost-button dashboard-logout" type="button" data-logout>Logout</button>
      </div>
    </section>

    <div class="byteit-status" data-status hidden></div>

    <section class="dashboard-panel">
      <h1>Registration overview</h1>
      <div class="dashboard-stats">
        <div class="stat-box">
          <span>Registered teams</span>
          <strong data-registered-count>0</strong>
        </div>
        <div class="stat-box">
          <span>Available events</span>
          <strong data-available-count>11</strong>
        </div>
        <div class="stat-box">
          <span>Account</span>
          <strong>Active</strong>
        </div>
      </div>
    </section>

    <section class="event-list" data-event-list></section>
  </main>

  <div class="byteit-modal" data-registration-modal hidden>
    <section class="byteit-modal__panel">
      <div class="byteit-modal__top">
        <div>
          <h2 data-modal-title>Register Team</h2>
          <p class="byteit-muted" data-modal-meta></p>
        </div>
        <button class="modal-close" type="button" data-close-modal>close</button>
      </div>

      <form class="byteit-form" data-team-form>
        <input type="hidden" name="registrationId">
        <label>Team name
          <input type="text" name="teamName" required>
        </label>
        <div class="participant-grid" data-participants></div>
        <div class="modal-actions">
          <button class="ghost-button" type="button" data-close-modal>cancel</button>
          <button class="byteit-button" type="submit">save team</button>
        </div>
      </form>
    </section>
  </div>

  <script src="https://unpkg.com/lenis@1.1.2/dist/lenis.min.js"></script>
  <script src="assets/js/byteit-firebase-config.js?v=20260527-setpass2"></script>
  <script type="module" src="assets/js/byteit-dashboard.js?v=20260527-setpass2"></script>
  <script src="assets/js/resources.js"></script>
</body>

</html>
